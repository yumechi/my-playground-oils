name: CI

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build container image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Containerfile
          push: false
          load: true
          tags: oils-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run OSH tests
        run: docker run --rm oils-test:latest osh /scripts/test-osh.sh

      - name: Run YSH tests
        run: docker run --rm oils-test:latest ysh /scripts/test-ysh.ysh

      - name: Run OSH features demo
        run: docker run --rm oils-test:latest osh /scripts/features-osh.sh

      - name: Run YSH features demo
        run: docker run --rm oils-test:latest ysh /scripts/features-ysh.ysh
