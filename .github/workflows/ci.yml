name: CI

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: false
          load: true
          tags: oils-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run OSH tests
        run: docker run --rm oils-test:latest osh /scripts/test-osh.sh

      - name: Run YSH tests
        run: docker run --rm oils-test:latest ysh /scripts/test-ysh.ysh

      - name: Run OSH features demo
        run: docker run --rm oils-test:latest osh /scripts/features-osh.sh

      - name: Run YSH features demo
        run: docker run --rm oils-test:latest ysh /scripts/features-ysh.ysh
